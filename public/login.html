<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Te Ta AI — Dashboard Pronari</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #b45309;
      --primary-light: #d97706;
      --bg: #fafaf8;
      --surface: #ffffff;
      --border: #e7e5e4;
      --border2: #d6d3d1;
      --text: #1a1a18;
      --text2: #57534e;
      --text3: #78716c;
      --error: #ef4444;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    nav { position: sticky; top: 0; z-index: 100; background: rgba(250,250,248,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 24px; }
    .nav-inner { max-width: 1100px; margin: 0 auto; height: 60px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo-icon { width: 34px; height: 34px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 0.78rem; letter-spacing: -0.5px; }
    .nav-logo-text { font-weight: 700; font-size: 1rem; color: var(--text); letter-spacing: -0.3px; }
    .nav-back { display: flex; align-items: center; gap: 6px; color: var(--text2); text-decoration: none; font-size: 0.875rem; font-weight: 500; padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border); transition: border-color 0.15s, color 0.15s; }
    .nav-back:hover { border-color: var(--border2); color: var(--text); }

    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 24px; }

    .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.07); padding: 44px 40px; width: 100%; max-width: 420px; }
    .card-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; justify-content: center; }
    .card-logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 0.9rem; }
    .card-logo-text { font-weight: 700; font-size: 1.15rem; color: var(--text); letter-spacing: -0.4px; }

    h2 { font-size: 1.5rem; font-weight: 600; text-align: center; letter-spacing: -0.5px; margin-bottom: 8px; }
    .subtitle { font-size: 0.9375rem; color: var(--text2); text-align: center; margin-bottom: 32px; }

    .pin-input {
      width: 100%;
      padding: 16px 18px;
      border: 1.5px solid var(--border2);
      border-radius: 12px;
      font-size: 2rem;
      font-family: var(--font);
      font-weight: 700;
      color: var(--text);
      background: var(--bg);
      outline: none;
      text-align: center;
      letter-spacing: 1rem;
      transition: border-color 0.15s, box-shadow 0.15s;
      margin-bottom: 14px;
    }
    .pin-input::placeholder { font-size: 1.5rem; letter-spacing: 0.5rem; color: var(--border2); font-weight: 400; }
    .pin-input:focus { border-color: var(--primary); background: var(--surface); box-shadow: 0 0 0 3px rgba(180,83,9,0.08); }

    .login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: #fff; border: none; border-radius: 10px; font-size: 0.9375rem; font-weight: 600; font-family: var(--font); cursor: pointer; transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s; }
    .login-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(180,83,9,0.28); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    #loginErr { display: none; color: var(--error); font-size: 0.875rem; text-align: center; margin-top: 12px; padding: 10px 14px; background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; }

    .contact-note { text-align: center; font-size: 0.8125rem; color: var(--text3); margin-top: 20px; }
    .contact-note a { color: var(--primary); text-decoration: none; font-weight: 500; }
    .contact-note a:hover { text-decoration: underline; }

    footer { padding: 20px 24px; text-align: center; border-top: 1px solid var(--border); }
    .footer-copy { font-size: 0.8rem; color: var(--text3); }

    @media (max-width: 480px) { .login-card { padding: 32px 24px; } }
  </style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="/platform" class="nav-logo">
      <div class="nav-logo-icon">TT</div>
      <span class="nav-logo-text">Te Ta AI</span>
    </a>
    <a href="/platform" class="nav-back">← Faqja kryesore</a>
  </div>
</nav>

<main>
  <div class="login-card">
    <div class="card-logo">
      <div class="card-logo-icon">TT</div>
      <span class="card-logo-text">Te Ta AI</span>
    </div>
    <h2>Dashboard Pronari</h2>
    <p class="subtitle">Futni kodin 4-shifror të restorantit</p>

    <input
      type="text"
      id="pinInput"
      class="pin-input"
      inputmode="numeric"
      pattern="[0-9]*"
      maxlength="4"
      placeholder="• • • •"
      autocomplete="off"
      autofocus
    />

    <button class="login-btn" onclick="doLogin()">Hyr →</button>
    <div id="loginErr"></div>

    <p class="contact-note">
      Nuk keni kod? <a href="https://wa.me/355693720144" target="_blank">Na kontaktoni</a>
    </p>
  </div>
</main>

<footer>
  <p class="footer-copy">© 2026 Te Ta AI · Ndërtuar në Shqipëri</p>
</footer>

<script>
  async function doLogin() {
    const pin = document.getElementById('pinInput').value.trim();
    if (!pin || pin.length < 4) return;

    const btn = document.querySelector('.login-btn');
    const errEl = document.getElementById('loginErr');
    errEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Duke hyrë...';

    try {
      const res = await fetch('/auth/pin-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pin })
      });
      const data = await res.json();

      if (res.ok && data.success) {
        localStorage.setItem('tta_owner_key', data.owner_key);
        localStorage.setItem('tta_restaurant_id', data.restaurant_id);
        localStorage.setItem('tta_restaurant_name', data.restaurant_name);
        window.location.href = '/dashboard';
      } else {
        errEl.textContent = data.error || 'Kodi nuk është i saktë';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Hyr →';
      }
    } catch (err) {
      errEl.textContent = 'Gabim lidhjeje. Provoni përsëri.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Hyr →';
    }
  }

  document.getElementById('pinInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doLogin();
  });

  // Auto-submit when 4 digits entered
  document.getElementById('pinInput').addEventListener('input', (e) => {
    e.target.value = e.target.value.replace(/\D/g, '').slice(0, 4);
    if (e.target.value.length === 4) doLogin();
  });
</script>
</body>
</html>
